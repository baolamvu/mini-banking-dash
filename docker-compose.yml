services:
  postgres:
    image: postgres:16-alpine
    container_name: banking-postgres
    environment:
      POSTGRES_USER: lamvb
      POSTGRES_PASSWORD: lam123
      POSTGRES_DB: mini-banking
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U banking -d banking"]
      interval: 5s
      timeout: 5s
      retries: 10

  banking-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: banking-api
    environment:
      DATABASE_URL: postgresql://lamvb:lam123@postgres:5432/mini-banking
      APP_VERSION: "1.0.0"
      APP_THEME: blue
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  banking-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: banking-frontend
    ports:
      - "8080:8080"
    depends_on:
      banking-api:
        condition: service_healthy

volumes:
  postgres_data:
