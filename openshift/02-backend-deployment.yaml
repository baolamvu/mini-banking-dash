apiVersion: apps/v1
kind: Deployment
metadata:
  name: banking-api
  namespace: banking-demo
  labels:
    app: banking-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: banking-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: banking-api
    spec:
      containers:
        - name: banking-api
          image: banking-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgresql-secret
                  key: DATABASE_URL
            - name: APP_VERSION
              value: "1.0.0"
            - name: APP_THEME
              value: blue
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 256Mi
              cpu: 500m
---
apiVersion: v1
kind: Service
metadata:
  name: banking-api
  namespace: banking-demo
  labels:
    app: banking-api
spec:
  selector:
    app: banking-api
  ports:
    - port: 8000
      targetPort: 8000
