name: Deploy to OpenShift

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  OPENSHIFT_SERVER: https://api.crc.testing:6443
  OPENSHIFT_PROJECT: banking-demo

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install oc CLI
        uses: redhat-actions/openshift-tools-install@v1
        with:
          source: "okd"
          oc: "4"

      - name: Login to OpenShift
        run: |
          oc login ${{ env.OPENSHIFT_SERVER }} \
            --token=${{ secrets.OPENSHIFT_TOKEN }} \
            --insecure-skip-tls-verify=true
          oc project ${{ env.OPENSHIFT_PROJECT }}

      - name: Build and deploy backend
        run: |
          oc start-build banking-api --from-dir=./backend --follow --wait || \
            oc new-build --name=banking-api --strategy=docker --binary=true
          oc start-build banking-api --from-dir=./backend --follow --wait
          oc apply -f openshift/02-backend-deployment.yaml
          oc rollout status deployment/banking-api --timeout=120s

      - name: Build and deploy frontend
        run: |
          oc start-build banking-frontend --from-dir=./frontend --follow --wait || \
            oc new-build --name=banking-frontend --strategy=docker --binary=true
          oc start-build banking-frontend --from-dir=./frontend --follow --wait
          oc apply -f openshift/04-frontend-deployment.yaml
          oc rollout status deployment/banking-frontend --timeout=120s
