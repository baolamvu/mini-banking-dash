server {
    listen 8080;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://banking-api:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /health {
        proxy_pass http://banking-api:8000/health;
    }

    location /ready {
        proxy_pass http://banking-api:8000/ready;
    }

    location /metrics {
        proxy_pass http://banking-api:8000/metrics;
    }
}
