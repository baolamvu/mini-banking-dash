# tekton/03-triggers.yaml

# ── PHẦN 1: TriggerBinding ──
# Đọc data từ GitHub webhook payload
apiVersion: triggers.tekton.dev/v1beta1
kind: TriggerBinding
metadata:
  name: github-push-binding
  namespace: banking-demo
spec:
  params:
    - name: GIT_COMMIT
      value: $(body.after)
    - name: GIT_BRANCH
      value: $(body.ref)

---
# ── PHẦN 2: TriggerTemplate ──
# Tạo PipelineRun khi có event
apiVersion: triggers.tekton.dev/v1beta1
kind: TriggerTemplate
metadata:
  name: banking-pipeline-template
  namespace: banking-demo
spec:
  params:
    - name: GIT_COMMIT
      default: latest
    - name: GIT_BRANCH
      default: main
  resourcetemplates:
    - apiVersion: tekton.dev/v1
      kind: PipelineRun
      metadata:
        generateName: banking-deploy-
        namespace: banking-demo
      spec:
        pipelineRef:
          name: banking-deploy-pipeline
        serviceAccountName: pipeline-sa
        params:
          - name: GIT_COMMIT
            value: $(tt.params.GIT_COMMIT)
          - name: GIT_BRANCH
            value: $(tt.params.GIT_BRANCH)
        timeouts:
          pipeline: 30m

---
# ── PHẦN 3: EventListener ──
# Pod listen webhook từ GitHub
apiVersion: triggers.tekton.dev/v1beta1
kind: EventListener
metadata:
  name: github-event-listener
  namespace: banking-demo
spec:
  serviceAccountName: pipeline-sa
  triggers:
    - name: github-push-trigger
      interceptors:
        - ref:
            name: cel
          params:
            - name: filter
              value: >
                body.ref == 'refs/heads/main' &&
                body.commits.size() > 0
      bindings:
        - ref: github-push-binding
      template:
        ref: banking-pipeline-template

---
# ── PHẦN 4: Route cho EventListener ──
# Expose EventListener ra ngoài để GitHub gọi được
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: github-webhook
  namespace: banking-demo
spec:
  to:
    kind: Service
    name: el-github-event-listener
  port:
    targetPort: http-listener
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect