# tekton/03-triggers.yaml
apiVersion: triggers.tekton.dev/v1beta1
kind: TriggerBinding
metadata:
  name: github-push-binding
  namespace: banking-demo
spec:
  params:
    - name: GIT_COMMIT
      value: $(body.after)
    - name: GIT_BRANCH
      value: $(body.ref)

---
apiVersion: triggers.tekton.dev/v1beta1
kind: TriggerTemplate
metadata:
  name: banking-both-template
  namespace: banking-demo
spec:
  params:
    - name: GIT_COMMIT
      default: latest
    - name: GIT_BRANCH
      default: main
  resourcetemplates:
    - apiVersion: tekton.dev/v1
      kind: PipelineRun
      metadata:
        generateName: banking-both-deploy-
        namespace: banking-demo
      spec:
        pipelineRef:
          name: banking-deploy-pipeline
        serviceAccountName: pipeline-sa
        params:
          - name: GIT_COMMIT
            value: $(tt.params.GIT_COMMIT)
          - name: GIT_BRANCH
            value: $(tt.params.GIT_BRANCH)

---
apiVersion: triggers.tekton.dev/v1beta1
kind: TriggerTemplate
metadata:
  name: banking-backend-template
  namespace: banking-demo
spec:
  params:
    - name: GIT_COMMIT
      default: latest
    - name: GIT_BRANCH
      default: main
  resourcetemplates:
    - apiVersion: tekton.dev/v1
      kind: PipelineRun
      metadata:
        generateName: banking-backend-deploy-
        namespace: banking-demo
      spec:
        pipelineRef:
          name: banking-backend-deploy-pipeline
        serviceAccountName: pipeline-sa
        params:
          - name: GIT_COMMIT
            value: $(tt.params.GIT_COMMIT)
          - name: GIT_BRANCH
            value: $(tt.params.GIT_BRANCH)

---
apiVersion: triggers.tekton.dev/v1beta1
kind: TriggerTemplate
metadata:
  name: banking-frontend-template
  namespace: banking-demo
spec:
  params:
    - name: GIT_COMMIT
      default: latest
    - name: GIT_BRANCH
      default: main
  resourcetemplates:
    - apiVersion: tekton.dev/v1
      kind: PipelineRun
      metadata:
        generateName: banking-frontend-deploy-
        namespace: banking-demo
      spec:
        pipelineRef:
          name: banking-frontend-deploy-pipeline
        serviceAccountName: pipeline-sa
        params:
          - name: GIT_COMMIT
            value: $(tt.params.GIT_COMMIT)
          - name: GIT_BRANCH
            value: $(tt.params.GIT_BRANCH)

---
apiVersion: triggers.tekton.dev/v1beta1
kind: EventListener
metadata:
  name: github-event-listener
  namespace: banking-demo
spec:
  serviceAccountName: pipeline-sa
  triggers:
    - name: trigger-both
      interceptors:
        - ref:
            name: cel
          params:
            - name: filter
              value: >
                body.ref == 'refs/heads/main' && body.commits.size() > 0 &&
                (
                  (body.commits.exists(c, c.added.exists(f, f.startsWith('backend/')) || c.modified.exists(f, f.startsWith('backend/')) || c.removed.exists(f, f.startsWith('backend/')))) &&
                  (body.commits.exists(c, c.added.exists(f, f.startsWith('frontend/')) || c.modified.exists(f, f.startsWith('frontend/')) || c.removed.exists(f, f.startsWith('frontend/'))))
                )
      bindings:
        - ref: github-push-binding
      template:
        ref: banking-both-template

    - name: trigger-backend-only
      interceptors:
        - ref:
            name: cel
          params:
            - name: filter
              value: >
                body.ref == 'refs/heads/main' && body.commits.size() > 0 &&
                (body.commits.exists(c, c.added.exists(f, f.startsWith('backend/')) || c.modified.exists(f, f.startsWith('backend/')) || c.removed.exists(f, f.startsWith('backend/')))) &&
                !(body.commits.exists(c, c.added.exists(f, f.startsWith('frontend/')) || c.modified.exists(f, f.startsWith('frontend/')) || c.removed.exists(f, f.startsWith('frontend/'))))
      bindings:
        - ref: github-push-binding
      template:
        ref: banking-backend-template

    - name: trigger-frontend-only
      interceptors:
        - ref:
            name: cel
          params:
            - name: filter
              value: >
                body.ref == 'refs/heads/main' && body.commits.size() > 0 &&
                !(body.commits.exists(c, c.added.exists(f, f.startsWith('backend/')) || c.modified.exists(f, f.startsWith('backend/')) || c.removed.exists(f, f.startsWith('backend/')))) &&
                (body.commits.exists(c, c.added.exists(f, f.startsWith('frontend/')) || c.modified.exists(f, f.startsWith('frontend/')) || c.removed.exists(f, f.startsWith('frontend/'))))
      bindings:
        - ref: github-push-binding
      template:
        ref: banking-frontend-template

---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: github-webhook
  namespace: banking-demo
spec:
  to:
    kind: Service
    name: el-github-event-listener
  port:
    targetPort: http-listener
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect