# tekton/00-serviceaccount.yaml
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pipeline-sa
  namespace: banking-demo
---
# quyền edit
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pipeline-sa-edit
  namespace: banking-demo
subjects:
  - kind: ServiceAccount
    name: pipeline-sa
    namespace: banking-demo
roleRef:
  kind: ClusterRole
  name: edit
  apiGroup: rbac.authorization.k8s.io
---
# quyền build image
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pipeline-sa-buildconfig
  namespace: banking-demo
subjects:
  - kind: ServiceAccount
    name: pipeline-sa
    namespace: banking-demo
roleRef:
  kind: ClusterRole
  name: system:image-builder
  apiGroup: rbac.authorization.k8s.io
---
# quền read cluster
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: pipeline-sa-cluster-reader
subjects:
  - kind: ServiceAccount
    name: pipeline-sa
    namespace: banking-demo
roleRef:
  kind: ClusterRole
  name: cluster-reader
  apiGroup: rbac.authorization.k8s.io