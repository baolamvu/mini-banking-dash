# tekton/02-pipeline.yaml
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: banking-deploy-pipeline
  namespace: banking-demo
spec:
  # Params Pipeline nhận từ bên ngoài (từ Trigger hoặc manual run)
  params:
    - name: GIT_COMMIT
      type: string
      description: Git commit SHA, dùng làm image tag
      default: latest
    - name: GIT_BRANCH
      type: string
      description: Git branch name
      default: main

  tasks:
    # ── Task 1 và 2 chạy SONG SONG ──
    # (không có runAfter → Tekton tự chạy đồng thời)

    - name: build-backend          # Tên instance task trong pipeline
      taskRef:
        name: build-backend        # Trỏ tới Task đã định nghĩa
      params:
        - name: IMAGE_TAG
          value: $(params.GIT_COMMIT)   # Truyền commit SHA vào Task

    - name: build-frontend
      taskRef:
        name: build-frontend
      params:
        - name: IMAGE_TAG
          value: $(params.GIT_COMMIT)

    # ── Task 3 chạy SAU KHI cả 2 build xong ──
    - name: deploy-and-verify
      taskRef:
        name: deploy-and-verify
      params:
        - name: IMAGE_TAG
          value: $(params.GIT_COMMIT)
      runAfter:
        - build-backend             # Phải đợi task này xong
        - build-frontend            # Và task này xong